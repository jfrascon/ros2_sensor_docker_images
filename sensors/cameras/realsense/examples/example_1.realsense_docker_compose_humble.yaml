services:
  realsense_srvc:
    image: realsense:humble
    network_mode: host
    privileged: false
    ipc: host
    volumes:
      - /dev:/dev
      # Why map /run/udev from host into the container?
      # - udev runs on the HOST and stores a volatile database of device properties/states under /run/udev.
      # - Mounting it read-only lets tools and libraries inside the container read udev attributes (IDs, symlinks,
      #   tags) so their view matches the host.
      # - It improves detection/consistency when dealing with hotplug. Note: udev events do NOT propagate into
      #   the container; this mount is only for reading metadata/state.
      - /run/udev:/run/udev:ro
      - ./example_1.realsense_params.yaml:/tmp/params.yaml
      # This script is meant to be use to launch each sensor manually inside the container.
      # First, you launch the container in debug mode (more details in the 'command' tag), next execute a bash shell
      # inside the container, and finally run this script.
      - ./test_manual.sh:/tmp/test_manual.sh
      - ./cyclonedds_config_no_peer.xml:/tmp/cyclonedds_config_no_peer.xml
      - ../eut_sensor.launch.py:/home/sensor/workspace/install/share/realsense2_camera/launch/eut_sensor.launch.py:ro
    device_cgroup_rules:
      - 'c 81:* rwm'  # 81 is video4linux
      - 'c 189:* rwm' # 189 is usb_device
    environment:
      - NAMESPACE=/test                       # optional, default is ''
      - ROBOT_NAME=robot                      # required
      - PARAMS_FILE=/tmp/params.yaml          # required
      # No need to apply remappings, topics are sensibly named by default.
      # LOG_OPTIONS is optional.
      - LOG_OPTIONS="log-level=info,disable-stdout-logs=false,disable-rosout-logs=false,disable-external-lib-logs=true"
      # NODE_OPTIONS is optional. Default node name is 'realsense2_camera_node'.
      - NODE_OPTIONS="name=realsense_ros2_driver,output=screen,emulate_tty=True,respawn=False,respawn_delay=0.0"
      - ROS_DOMAIN_ID=11
      - ROS_LOCALHOST_ONLY=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///tmp/cyclonedds_config_no_peer.xml
    # init: true enables a tiny init (tini) as PID 1 inside the container.
    # It forwards signals (SIGTERM/SIGINT) to the app and reaps zombie processes from child workers, preventing dirty
    # shutdowns and resource leaks.
    # It is not a supervisor— it won’t restart your app; it only fixes PID-1 semantics.
    # Recommended for services that spawn subprocesses or use launchers/daemons (e.g., ros2 launch, drivers).
    init: true
    # command: ["ros2", "launch", "realsense2_camera", "eut_sensor.launch.py"]
    # To debug the container, you can use these steps:
    # 1. Comment the 'command' line above.
    # 2. Uncomment the lines below to start a bash shell in the container.
    # 3. Run the script /tmp/test_manual.sh inside the container to launch the realsense node.
    stdin_open: true
    tty: true
    command: ["bash"]
