# These are all the parameters you can set for the binary 'realsense2_camera_node'.
# The values assigned in this file to the parameters are not necessarily the default values; they are just an example
# configuration.
# Default parameters with their values can be found in the realsense-ros repository at:
# https://github.com/IntelRealSense/realsense-ros/blob/ros2-master/realsense2_camera/launch/rs_launch.py#L23
# Parameters 'camera_namespace', 'config_file', 'output' and 'log_level', defined in the 'rs_launch.py' launch file,
# are not included here, since they are not considered in the file 'eut_sensor.launch.py'.
# Read the comments in the file 'eut_sensor.launch.py' for more details about these parameters.
# If you define your own configuration file, there is no need to set all of these parameters. Only set the parameters
# you want to change from their default values.
# There is no need to prepend names and id with the robot name, as this is done automatically by the launch file.
# camera_name is prefixed with '<robot_name>_' automatically by the launch file.
camera_name: camera
base_frame_id: "link"
accel_fps: 0
accelerate_gpu_with_glsl: false # enable GPU acceleration with GLSL
align_depth.enable: true # enable align depth filter
angular_velocity_cov: 0.01
clip_distance: -2.0
colorizer.enable: false # enable colorizer filter
decimation_filter.enable: false # enable_decimation_filter
depth_module.color_format: RGB8 # color stream format for d405
depth_module.color_profile: "640x480x60" # Depth module color stream profile for d405
depth_module.depth_format: Z16 # depth stream format
depth_module.depth_profile: "640x480x60" # depth stream profile
depth_module.enable_auto_exposure: true # enable/disable auto exposure for depth image
depth_module.exposure: 8500 # Depth module manual exposure value
depth_module.exposure.1: 7500 # Depth module first exposure value. Used for hdr_merge filter
depth_module.exposure.2: 1 # Depth module second exposure value. Used for hdr_merge filter
depth_module.gain: 16 # Depth module manual gain value
depth_module.gain.1: 16 # Depth module first gain value. Used for hdr_merge filter
depth_module.gain.2: 16 # Depth module second gain value. Used for hdr_merge filter
depth_module.hdr_enabled: false # Depth module hdr enablement flag. Used for hdr_merge filter
depth_module.infra1_format: Y8 # infra1 stream format
depth_module.infra2_format: Y8 # infra2 stream format
depth_module.infra_format: RGB8 # infra0 stream format
depth_module.infra_profile: "640x480x60" # infra streams (0/1/2) profile
depth_module.inter_cam_sync_mode: 0 # [0-Default, 1-Master, 2-Slave]
diagnostics_period: 0.0 # Rate of publishing diagnostics. 0=Disabled
disparity_filter.enable: false # enable_disparity_filter
device_type: "" # choose device by type
enable_accel: false # "enable accel stream"
enable_color: true # enable color stream
enable_depth: true # enable depth stream
enable_gyro: false # "enable gyro stream"
enable_infra: false # enable infra0 stream
enable_infra1: false # enable infra1 stream
enable_infra2: false # enable infra2 stream
enable_motion: false # "enable motion stream (IMU) for DDS devices"
enable_rgbd: false # "enable rgbd topic"
enable_sync: true # "enable sync mode"
gyro_fps: 0
hdr_merge.enable: false # hdr_merge filter enablement flag
hole_filling_filter.enable: false # enable_hole_filling_filter
initial_reset: false
json_file_path: "" # allows advanced configuration
linear_accel_cov: 0.01
pointcloud.allow_no_texture_points: false
pointcloud.enable: false
pointcloud.ordered_pc: false
pointcloud.stream_filter: 2 # texture stream for pointcloud
pointcloud.stream_index_filter: 0 # texture stream index for pointcloud
# If you are using a robot_state_publisher node to publish TFs for all sensors, and the robot_state_publisher is
# already publishing the TFs for the realsense camera, be sure if you need to set the flag 'publish_tf' to 'false' to
# avoid TF conflicts.
# In the URDF file for the realsense cameras there is this block of code:
# ...
# <!--
# Use the nominal extrinsics between camera frames if the calibrated extrinsics aren't being published. e.g. running
# the device in simulation
# -->
# <xacro:if value="${use_nominal_extrinsics}">
#   <!-- camera depth joints and links -->
#   <link name="${prefix}${name}_depth_frame"/>
# ...
# If the flag 'use_nominal_extrinsics' is set to true, then the static TFs will be published by default by the
# robot_state_publisher node, since some links and joints in the URDF of the realsense cameras have been defined.
# Therefore, set the flag 'publish_tf' to false in order to avoid TF conflicts.
publish_tf: true # [bool] enable/disable publishing static & dynamic TF.
reconnect_timeout: 6.0 # Timeout(seconds) between consequtive reconnection attempts
rgb_camera.color_format: RGB8 # color stream format
rgb_camera.color_profile: "640x480x60" # color stream profile
rgb_camera.enable_auto_exposure: true # enable/disable auto exposure for color image
rosbag_filename: "" # A realsense bagfile to run from as a device
rosbag_loop: false # Enable loop playback when playing a bagfile
rotation_filter.enable: false # enable rotation_filter
rotation_filter.rotation: 0.0 # rotation value: 0.0, 90.0, -90.0, 180.0
# Serial number can be useful when you have multiple devices connected.
serial_no: "" # choose device by serial number
spatial_filter.enable: false # enable_spatial_filter
temporal_filter.enable: false # enable_temporal_filter
tf_publish_rate: 1.0 # [double] rate in Hz for publishing dynamic TF
unite_imu_method: 0 # [0-None, 1-copy, 2-linear_interpolation]
usb_port_id: "" # choose device by usb port id
wait_for_device_timeout: -1.0 # Timeout for waiting for device to connect (Seconds)
