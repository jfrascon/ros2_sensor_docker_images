# https://docs.docker.com/compose/environment-variables/#the-env-file
services:
  realsense_srvc:
    image: ${IMG_ID}
    network_mode: host
    privileged: false
    ipc: host
    volumes:
      - /dev:/dev # to access camera video and USB devices
      # Why map /run/udev from host into the container?
      # - udev runs on the HOST and stores a volatile database of device properties/states under /run/udev.
      # - Mounting it read-only lets tools and libraries inside the container read udev attributes (IDs, symlinks,
      #   tags) so their view matches the host.
      # - It improves detection/consistency when dealing with hotplug. Note: udev events do NOT propagate into
      #   the container; this mount is only for reading metadata/state.
      - /run/udev:/run/udev:ro
      # This line allows running graphical applications in the container and visualizing them on the host.
      # This works provided that the host has a display connected (so the X11 socket exists) and the
      # necessary permissions have been granted (e.g. by running `xhost +local:` on the host).
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./realsense_params.yaml:/tmp/params.yaml
      - ./run_realsense_launch.sh:/tmp/run_realsense_launch.sh
    device_cgroup_rules:
      - "c 81:* rwm" # 81 is video4linux
      - "c 189:* rwm" # 189 is usb_device
    # Environment variables passed to the container.
    # Keep PARAMS_FILE explicit here because it must match the path defined in 'volumes' above.
    # This improves visibility and avoids hiding this fixed mapping inside the external .env file.
    environment:
      PARAMS_FILE: /tmp/params.yaml
    # Additional environment variables are loaded from the file pointed to by ENV_FILE.
    # Set ENV_FILE in the host environment before running `docker compose`.
    env_file:
      - ${ENV_FILE:?ENV_FILE is required}
