# Attention should be paid to the node's name.
# Check whether the name of the node is the default one or custom (See NODE_OPTIONS environment variable in
# docker-compose file).
/**:
  ros__parameters:
    port: /dev/ttyUSB0
    baud: 115200
    update_rate: 20
    mag_updates: True
    accel_updates: True
    zero_gyros: True
    frame_id: $(var robot_prefix)imu_link
    linear_acceleration_stdev: 0.06 # (6.118 mg * 1e-3f g/mg) = 0.006118 g -> 0.006118 * 9.80665 = 0.06 m/s^2
    angular_velocity_stdev: 0.005 # 2.86 deg/s * (3.14159 / 180.0) = 0.05 rad/s
    tf_ned_to_enu: True
